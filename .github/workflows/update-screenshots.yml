name: Update first-view screenshots

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: write

jobs:
  update-screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build browser data
        run: npm run build:data

      - name: Capture first-view screenshots
        run: npm run screenshots

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No screenshot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/examples/screenshots assets/js/data.js data/examples.json data/prompts.json
          git commit -m "Update first-view screenshots"
          git push

